<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg,#0d001a,#3a0066);
    color: white;
}

.container {
    width: 320px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    background: rgba(255,0,255,0.2);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(255,0,255,0.3);
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#ff00cc,#ff3366);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.status {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
    color: #ff99ff;
}
</style>

<script>
function kirimGC() {
    var link = document.getElementById("linkgc").value;
    var tipe = document.getElementById("tipebug").value;

    if(link == "") {
        alert("Masukin link group dulu");
        return;
    }

    document.getElementById("status").innerHTML =
    "Status: terkirim (simulasi)<br>Target: " + link + "<br>Tipe: " + tipe;
}
</script>

</head>
<body>

<div class="container">

<div class="header">
<h2>GROUP CONTROL PANEL</h2>
Role: OWNER<br>
Status: ACTIVE
</div>

<div class="card">

<label>Link Group WhatsApp</label>
<input type="text" id="linkgc" placeholder="https://chat.whatsapp.com/xxxx">

<label>Pilih Mode</label>
<select id="tipebug">
<option>Crash Group</option>
<option>Freeze Group</option>
<option>Delay Group</option>
<option>Spam Group</option>
</select>

<button onclick="kirimGC()">SEND</button>

<div class="status" id="status">
Status: standby
</div>

</div>

</div>

</body>
</html>
